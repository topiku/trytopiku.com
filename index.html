<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topiku — Custom Sustainable Hats for Brands</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1a1f2e;
      --warm: #f5f2ec;
      --mid: #6b7280;
      --border: rgba(26,31,46,0.1);
      --accent: #1f8776;
      --dark-btn: #2d2d2d;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--warm); color: var(--ink); overflow-x: hidden; }

    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 5rem 5%;
    }
    .hero-logo {
      width: 25%; max-width: 220px; margin-bottom: 2.5rem;
      opacity: 0; animation: fadeUp 0.7s 0.1s forwards;
    }
    .hero h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(2.4rem, 5.5vw, 5rem);
      font-weight: 700; line-height: 1.08;
      color: var(--ink); max-width: 780px; margin-bottom: 1.4rem;
      opacity: 0; animation: fadeUp 0.7s 0.25s forwards;
    }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .hero p {
      font-size: 1.05rem; font-weight: 300; line-height: 1.75;
      color: var(--mid); max-width: 520px; margin-bottom: 2.5rem;
      opacity: 0; animation: fadeUp 0.7s 0.4s forwards;
    }
    .hero-actions {
      opacity: 0; animation: fadeUp 0.7s 0.55s forwards;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--dark-btn); color: #fff;
      text-decoration: none; font-size: 0.95rem; font-weight: 500;
      padding: 0.9rem 2rem; border-radius: 2px;
      transition: background 0.2s, transform 0.15s; letter-spacing: 0.03em;
    }
    .btn-primary:hover { background: #111; transform: translateY(-1px); }

    footer {
      border-top: 1px solid var(--border); padding: 2rem 5%;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    }
    footer span { font-size: 0.78rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mid); }
    footer .footer-links { display: flex; gap: 1.5rem; }
    footer a { font-size: 0.78rem; color: var(--mid); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--ink); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<section class="hero">
  <img src="TOPIKU-Logo-Horizontal.png" alt="Topiku" class="hero-logo"
       onerror="this.outerHTML='<div style=\'opacity:0.2;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:2.5rem\'>[TOPIKU-Logo-Horizontal.png]</div>'" />
  <h1>Custom Hats That<br><em>Tell Your Brand's Story.</em></h1>
  <p>Wholesale eco-friendly caps made from recycled & upcycled materials — with the lowest carbon footprint on the market. Trusted by leading global brands since 2015.</p>
  <div class="hero-actions">
    <a href="https://topiku.co/custom-hats" class="btn-primary" target="_blank" rel="noopener">
      Start Designing
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 8h10M9 4l4 4-4 4"/>
      </svg>
    </a>
  </div>
</section>

<footer>
  <span>Topiku © 2025</span>
  <div class="footer-links">
    <a href="https://topiku.co" target="_blank">topiku.co</a>
    <a href="https://topiku.co/custom-hats" target="_blank">Custom Hats</a>
    <a href="https://topiku.co/pages/sustainability" target="_blank">Sustainability</a>
  </div>
</footer>

</body>
</html>
